<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews</title>
    <link rel="stylesheet" href="./src/css/style.css">
    <script src="./src/js/script.js" defer></script>
</head>

<body>

    <div class="card" id="card">
        <img id="img" src="/src/assets/img/userIcon.svg" alt="imagem do usuário">

        <div class="card-content">
            <h1 id="name">Guilherme Souza</h1>
            <h2 id="job">Front-End Developer</h2>
            <p id="text">Gostei bastante do curso, mas acredito que poderia ter mais exemplos práticos.</p>

            <div class="card-btn">
                <button class="prev-btn" id="prev-btn">←</button>
                <button class="random-btn" id="random-btn">Surpreenda-me</button>
                <button class="next-btn" id="next-btn">→</button>
            </div>
        </div>
    </div>

</body>

</html>
